<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Library Hub | Immersive Student Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFBF7;
            /* Dense, fine mesh grid to ensure absolutely no blank or empty-feeling gaps */
            background-image: 
                linear-gradient(rgba(230, 223, 211, 0.4) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(230, 223, 211, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F7F4EF; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #E6DFD3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        /* Premium Bright Glass Layering with Multi-directional Soft Shadows */
        .premium-glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 
                0px 20px 40px -12px rgba(215, 204, 188, 0.5),
                0px 1px 3px rgba(0, 0, 0, 0.02);
        }

        /* Scandi Minimalist Light Oak Wood Desk Design */
        .scandi-oak-table {
            background: linear-gradient(135deg, #F5E6D3 0%, #ECDCC5 100%);
            border: 2px solid #DBCEB4;
            box-shadow: 
                inset 0 2px 4px rgba(255, 255, 255, 0.6),
                0 10px 24px -8px rgba(184, 169, 147, 0.4);
        }

        /* Smooth Target Matching Pulse */
        .magic-radar-pulse {
            animation: radar-glow 2.5s infinite ease-in-out;
        }
        @keyframes radar-glow {
            0%, 100% { transform: scale(1.05); box-shadow: 0 0 0 0 rgba(74, 144, 226, 0.5), 0 0 20px rgba(74, 144, 226, 0.2); border-color: #4A90E2; }
            50% { transform: scale(1.12); box-shadow: 0 0 0 10px rgba(74, 144, 226, 0), 0 0 35px rgba(74, 144, 226, 0.5); border-color: #3A78C4; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased selection:bg-pink-100 selection:text-pink-800 overflow-x-hidden">

    <nav class="bg-[#F7F4EF]/90 backdrop-blur-md border-b border-[#E6DFD3] sticky top-0 z-50 px-6 sm:px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-[#CDEEFF] w-12 h-12 rounded-2xl flex items-center justify-center text-[#3A78C4] shadow-sm border border-[#B3E0FF]">
                    <i class="fa-solid fa-leaf text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-800 tracking-tight text-slate-900">College Library Hub</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Your Cozy Study Sanctuary</p>
                </div>
            </div>
            <div class="bg-[#ECEFF1] border border-slate-200 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)] animate-pulse"></span>
                <span class="text-[10px] font-800 text-slate-500 uppercase tracking-wider font-mono">Live Sync</span>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto p-4 sm:p-6 pb-0">
        <div class="premium-glass-card rounded-3xl p-6 flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
            <div class="absolute -right-12 -top-12 w-32 h-32 bg-pink-100/40 rounded-full blur-2xl pointer-events-none"></div>
            
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="bg-[#ECEFF1] w-12 h-12 rounded-2xl flex items-center justify-center text-slate-500 border border-slate-200 shrink-0 shadow-inner">
                    <i class="fa-solid fa-square-poll-vertical text-lg text-slate-600"></i>
                </div>
                <div>
                    <h2 class="text-base font-800 text-slate-900">Space Utilization Stream</h2>
                    <div class="flex flex-wrap items-center gap-3 mt-1.5 text-xs">
                        <span id="hud-total-busy" class="bg-[#FFD2E2] border border-[#FFAEC9] text-[#D84A75] px-3 py-1 rounded-xl font-bold flex items-center gap-1.5">0 Busy Seats</span>
                        <span id="hud-total-open" class="bg-[#CDEEFF] border border-[#B3E0FF] text-[#3A78C4] px-3 py-1 rounded-xl font-bold flex items-center gap-1.5">0 Open Spots</span>
                    </div>
                </div>
            </div>
            
            <button onclick="executeMagicSeatMatch()" class="w-full md:w-auto bg-gradient-to-r from-[#3A78C4] to-[#4A90E2] hover:from-[#4A90E2] hover:to-[#3A78C4] text-white font-800 text-sm px-6 py-4 rounded-2xl shadow-lg shadow-sky-200 transition-all duration-300 transform active:scale-95 flex items-center justify-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles text-xs"></i> Find Me an Open Seat Now
            </button>
        </div>
    </header>

    <div class="flex justify-center p-4 lg:hidden sticky top-[73px] z-40 bg-[#FDFBF7]/40 backdrop-blur-sm">
        <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-1.5 rounded-2xl flex gap-1 premium-glass-card">
            <button id="toggle-seats-btn" onclick="switchMobileTab('seats')" class="px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 bg-[#CDEEFF] border border-[#B3E0FF] text-[#3A78C4]">
                <i class="fa-solid fa-compass"></i> Reading Bay
            </button>
            <button id="toggle-books-btn" onclick="switchMobileTab('books')" class="px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 text-slate-500 hover:text-slate-800">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Bookshelf Catalogue
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
        
        <div id="seats-panel" class="lg:col-span-5 space-y-6 block transition-all duration-300">
            <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-5 sm:p-6 rounded-3xl premium-glass-card">
                <div class="mb-5">
                    <h2 class="text-base font-800 text-slate-900 flex items-center gap-2">
                        <i class="fa-solid fa-compass text-pink-400"></i> Reading Bay Architecture
                    </h2>
                    <p class="text-xs text-slate-400 mt-0.5">Filter the room layouts instantly by designated sectors</p>
                </div>

                <div class="bg-[#FDFBF7]/90 border border-[#E6DFD3] p-1 rounded-xl flex gap-1 mb-6 overflow-x-auto no-scrollbar">
                    <button id="zone-btn-all" onclick="filterRadarZone('all')" class="px-4 py-2 rounded-lg text-xs font-800 transition-all duration-200 whitespace-nowrap bg-slate-900 text-white shadow-sm">All Sections</button>
                    <button id="zone-btn-main" onclick="filterRadarZone('main')" class="px-4 py-2 rounded-lg text-xs font-800 transition-all duration-200 whitespace-nowrap text-slate-500 hover:text-slate-800">🌳 Oak Center</button>
                    <button id="zone-btn-quiet" onclick="filterRadarZone('quiet')" class="px-4 py-2 rounded-lg text-xs font-800 transition-all duration-200 whitespace-nowrap text-slate-500 hover:text-slate-800">🤫 Silent Pods</button>
                </div>

                <div class="border-2 border-dashed border-[#E6DFD3] rounded-2xl p-6 bg-[#FDFBF7]/40 relative max-h-[500px] overflow-y-auto space-y-14 flex flex-col items-center">
                    <div id="library-bays-container" class="w-full space-y-16 py-4 flex flex-col items-center transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <div id="books-panel" class="lg:col-span-7 space-y-6 hidden lg:block transition-all duration-300">
            <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-5 sm:p-6 rounded-3xl premium-glass-card">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <div>
                        <h2 class="text-base font-800 text-slate-900 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles text-sky-400"></i> Boutique Discovery Desk
                        </h2>
                        <p class="text-xs text-slate-400 mt-0.5">Type to query real-time material allocations</p>
                    </div>

                    <div class="relative w-full sm:w-64">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input id="catalog-search" type="text" oninput="executeLiveSearch()" placeholder="Search title, author, shelf row..." class="w-full pl-10 pr-4 py-3 bg-[#FDFBF7] border border-[#E6DFD3] rounded-2xl text-xs text-slate-800 placeholder:text-slate-400 focus:outline-none focus:border-sky-400 focus:ring-4 focus:ring-sky-100 transition-all font-medium shadow-inner">
                    </div>
                </div>

                <div id="student-books-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://college-library-hub.onrender.com';
        const socket = io(BACKEND_URL);

        let systemSeatsArray = [];
        let globalCurrentZoneFilter = 'all';

        document.addEventListener("DOMContentLoaded", () => {
            fetchSystemRadarData();
            fetchLiveBooksCatalog();
        });

        async function fetchSystemRadarData() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/seats`);
                systemSeatsArray = await response.json();
                calculateHUDAnalytics(systemSeatsArray);
                renderModularZoneGrid(systemSeatsArray);
            } catch(e) { console.error(e); }
        }

        function calculateHUDAnalytics(seats) {
            const busy = seats.filter(s => s.is_occupied).length;
            const open = seats.length - busy;
            document.getElementById('hud-total-busy').innerHTML = `<i class="fa-solid fa-user-lock mr-1"></i> ${busy} Busy Seats`;
            document.getElementById('hud-total-open').innerHTML = `<i class="fa-solid fa-circle-check mr-1"></i> ${open} Open Spots`;
        }

        // =========================================================================
        // 🪑 HIGH-FIDELITY SCANDI BRIGHT ROOM MESH GENERATOR
        // =========================================================================
        function renderModularZoneGrid(seats) {
            const mainContainer = document.getElementById('library-bays-container');
            mainContainer.innerHTML = '';

            const seatsPerTable = 10;
            const totalTables = Math.ceil(seats.length / seatsPerTable);

            const relativeChairCoordinates = [
                { top: '8%',  left: '-42px' }, { top: '26%', left: '-42px' }, { top: '44%', left: '-42px' }, { top: '62%', left: '-42px' }, { top: '80%', left: '-42px' },
                { top: '8%',  right: '-42px' }, { top: '26%', right: '-42px' }, { top: '44%', right: '-42px' }, { top: '62%', right: '-42px' }, { top: '80%', right: '-42px' }
            ];

            for (let t = 0; t < totalTables; t++) {
                let tableZone = t >= 3 ? 'quiet' : 'main';
                let zoneLabelText = t >= 3 ? '🤫 Silent Pods' : '🌳 Oak Center';
                
                if (globalCurrentZoneFilter !== 'all' && globalCurrentZoneFilter !== tableZone) continue;

                const tableWrapper = document.createElement('div');
                tableWrapper.className = "scandi-oak-table w-48 h-80 rounded-3xl relative flex items-center justify-center shrink-0 mb-4 transition-all duration-500 animate-fade-in";
                
                tableWrapper.innerHTML = `
                    <div class="absolute inset-y-0 w-[2px] bg-[#DBCEB4]/40 left-1/2 -translate-x-1/2 pointer-events-none"></div>
                    <div class="absolute inset-x-0 h-[2px] bg-[#DBCEB4]/40 top-1/2 -translate-y-1/2 pointer-events-none"></div>
                    
                    <div class="text-[8px] font-900 text-[#7C654D] uppercase tracking-widest bg-[#FDFBF7]/95 px-3 py-1.5 rounded-full border border-[#DBCEB4]/50 z-10 shadow-sm font-mono select-none flex flex-col items-center gap-0.5">
                        <span>Section ${String.fromCharCode(65 + t)}</span>
                        <span class="text-[6px] text-slate-400 font-sans font-normal tracking-normal lowercase">${tableZone === 'quiet' ? 'silent pod' : 'main room'}</span>
                    </div>
                `;

                const tableSeatsSlice = seats.slice(t * seatsPerTable, (t + 1) * seatsPerTable);

                tableSeatsSlice.forEach((seat, idx) => {
                    const occupied = seat.is_occupied;
                    const position = relativeChairCoordinates[idx];

                    const chairDiv = document.createElement('div');
                    chairDiv.className = "absolute w-10 h-10 flex items-center justify-center transition-all duration-300 z-20";
                    chairDiv.id = `chair-node-anchor-${seat.seat_number}`;
                    
                    if (position.left) chairDiv.style.left = position.left;
                    if (position.right) chairDiv.style.right = position.right;
                    chairDiv.style.top = position.top;

                    // Bold, clean, stylish pastel accent states
                    chairDiv.innerHTML = `
                        <div class="w-9 h-9 rounded-xl border-2 flex flex-col items-center justify-center transition-all duration-300 shadow-sm ${
                            occupied 
                            ? 'bg-[#FFD2E2] border-[#FFAEC9] text-[#D84A75] scale-105 shadow-pink-100' 
                            : 'bg-[#CDEEFF] border-[#B3E0FF] text-[#3A78C4] hover:bg-[#B3E0FF]/80 shadow-sky-50'
                        }">
                            <i class="fa-solid ${occupied ? 'fa-user-tag text-[9px]' : 'fa-chair text-xs'}"></i>
                            <span class="text-[6px] font-black uppercase font-mono mt-0.5">${seat.seat_number}</span>
                        </div>
                    `;
                    tableWrapper.appendChild(chairDiv);
                });

                mainContainer.appendChild(tableWrapper);
            }
        }

        // =========================================================================
        // 📚 DYNAMIC PASTEL-ACCENTED BOOK LOGISTICS TERM
        // =========================================================================
        async function fetchLiveBooksCatalog(searchQuery = '') {
            try {
                const url = searchQuery 
                    ? `${BACKEND_URL}/api/books?search=${encodeURIComponent(searchQuery)}`
                    : `${BACKEND_URL}/api/books`;

                const response = await fetch(url);
                const books = await response.json();
                const container = document.getElementById('student-books-container');
                container.innerHTML = '';

                if (books.length === 0) {
                    container.className = "flex flex-col items-center justify-center py-16 col-span-full text-center border-2 border-dashed border-[#E6DFD3] rounded-3xl bg-[#FDFBF7]";
                    container.innerHTML = `
                        <div class="text-[#E6DFD3] text-5xl mb-4"><i class="fa-solid fa-ghost"></i></div>
                        <p class="text-sm font-800 text-slate-700">No matching materials found</p>
                        <p class="text-xs text-slate-400 mt-1">Refine your search parameters</p>
                    `;
                    return;
                }

                container.className = "grid grid-cols-1 md:grid-cols-2 gap-5";

                books.forEach(book => {
                    const available = book.is_available;
                    const titleLower = book.title.toLowerCase();
                    
                    // Core dynamic contextual color accent system matching early configurations
                    let themeClass = "from-[#FDFBF7] to-[#F7F4EF]/40";
                    let tokenBadgeBg = "bg-[#ECEFF1] text-slate-600 border-slate-200/60";
                    
                    if (titleLower.includes('algorithm') || titleLower.includes('python')) {
                        themeClass = "from-[#FDFBF7] via-[#FDFBF7] to-purple-50/50 hover:to-purple-100/40";
                        tokenBadgeBg = "bg-purple-50 border border-purple-100 text-purple-600";
                    } else if (titleLower.includes('physics')) {
                        themeClass = "from-[#FDFBF7] via-[#FDFBF7] to-sky-50/50 hover:to-sky-100/40";
                        tokenBadgeBg = "bg-sky-50 border border-sky-100 text-[#3A78C4]";
                    }

                    const card = document.createElement('div');
                    card.className = `bg-[#FDFBF7] border border-[#E6DFD3] pt-7 px-5 pb-5 rounded-2xl flex flex-col justify-between hover:border-slate-300 hover:-translate-y-0.5 hover:shadow-xl transition-all duration-300 group relative overflow-hidden bg-gradient-to-b ${themeClass} premium-glass-card`;
                    
                    card.innerHTML = `
                        <div class="absolute top-0 right-4 w-8 h-9 flex items-center justify-center text-[8px] font-900 tracking-wider uppercase text-white rounded-b-md shadow-sm transition-all duration-300 group-hover:h-10 ${
                            available ? 'bg-[#98D8C8]' : 'bg-[#FF9AA2]'
                        }">
                            <span>${available ? 'OK' : 'OUT'}</span>
                        </div>

                        <div>
                            <span class="text-[8px] uppercase tracking-widest font-900 px-2.5 py-0.5 rounded-md border font-mono ${tokenBadgeBg}">
                                ${titleLower.includes('physics') || titleLower.includes('algorithm') ? 'Boutique Spotlight' : 'Catalog Asset'}
                            </span>
                            <h3 class="font-800 text-slate-900 text-sm mt-3 mb-1 group-hover:text-[#4A90E2] transition-colors leading-snug pr-6 tracking-tight">${book.title}</h3>
                            <p class="text-xs text-slate-500 font-medium">By ${book.author}</p>
                        </div>
                        
                        <div class="flex items-center justify-between pt-4 border-t border-[#F5F1E9] mt-5">
                            <span class="text-[9px] bg-[#FDFBF7] border border-[#E6DFD3] font-bold rounded-xl px-3 py-1 text-slate-600 flex items-center gap-1.5 shadow-inner">
                                <i class="fa-solid fa-map-pin text-[#4A90E2]/60"></i> ${book.shelf_location}
                            </span>
                            <span class="text-[10px] font-800 tracking-tight ${available ? 'text-[#3AA487]' : 'text-slate-400'}">
                                ${available ? 'Available Now' : 'Issued Out'}
                            </span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        // =========================================================================
        // 🧠 ACTIVE FLUID FILTERS & AUTO ALLOCATION MESH
        // =========================================================================
        function filterRadarZone(zone) {
            globalCurrentZoneFilter = zone;
            ['all', 'main', 'quiet'].forEach(b => {
                const btn = document.getElementById(`zone-btn-${b}`);
                if (b === zone) {
                    btn.className = "px-4 py-2 rounded-lg text-xs font-800 transition-all duration-200 whitespace-nowrap bg-slate-900 text-white shadow-sm";
                } else {
                    btn.className = "px-4 py-2 rounded-lg text-xs font-800 transition-all duration-200 whitespace-nowrap text-slate-500 hover:text-slate-800 border border-transparent";
                }
            });
            renderModularZoneGrid(systemSeatsArray);
        }

        function executeMagicSeatMatch() {
            const match = systemSeatsArray.find(s => !s.is_occupied);
            if (!match) return;

            if(window.innerWidth < 1024) switchMobileTab('seats');

            const targetZone = Math.floor((match.seat_number - 1) / 10) >= 3 ? 'quiet' : 'main';
            if (globalCurrentZoneFilter !== 'all' && globalCurrentZoneFilter !== targetZone) {
                filterRadarZone('all');
            }

            setTimeout(() => {
                const anchor = document.getElementById(`chair-node-anchor-${match.seat_number}`);
                if (anchor) {
                    anchor.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    const innerBox = anchor.firstElementChild;
                    innerBox.classList.add('magic-radar-pulse');
                    setTimeout(() => { innerBox.classList.remove('magic-radar-pulse'); }, 5000);
                }
            }, 250);
        }

        let searchTimeout;
        function executeLiveSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('catalog-search').value.trim();
            searchTimeout = setTimeout(() => { fetchLiveBooksCatalog(query); }, 250);
        }

        function switchMobileTab(tab) {
            const seatsPanel = document.getElementById('seats-panel');
            const booksPanel = document.getElementById('books-panel');
            const seatsBtn = document.getElementById('toggle-seats-btn');
            const booksBtn = document.getElementById('toggle-books-btn');

            if (tab === 'seats') {
                seatsPanel.classList.remove('hidden'); seatsPanel.classList.add('block');
                booksPanel.classList.remove('block'); booksPanel.classList.add('hidden');
                seatsBtn.className = "px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 bg-[#CDEEFF] border border-[#B3E0FF] text-[#3A78C4]";
                booksBtn.className = "px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 text-slate-500 hover:text-slate-800";
            } else {
                seatsPanel.classList.remove('block'); seatsPanel.classList.add('hidden');
                booksPanel.classList.remove('hidden'); booksPanel.classList.add('block');
                booksBtn.className = "px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 bg-[#CDEEFF] border border-[#B3E0FF] text-[#3A78C4]";
                seatsBtn.className = "px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 text-slate-500 hover:text-slate-800";
            }
        }

        socket.on('seatUpdated', () => { fetchSystemRadarData(); });
        socket.on('bookUpdated', () => {
            const currentQuery = document.getElementById('catalog-search').value.trim();
            fetchLiveBooksCatalog(currentQuery);
        });
    </script>
</body>
</html>
