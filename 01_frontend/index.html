<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Library Hub | Student Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFBF7;
            /* Faint premium matte grid texture to eliminate empty blank voids */
            background-image: linear-gradient(#F5F1E9 1px, transparent 1px), linear-gradient(90deg, #F5F1E9 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Smooth, modern aesthetic scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F7F4EF; }
        ::-webkit-scrollbar-thumb { background: #E6DFD3; border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        .aesthetic-shadow {
            box-shadow: 0px 12px 32px -4px rgba(230, 223, 211, 0.5);
        }
        .wood-grain {
            background: #EEDCC5;
            border: 3px solid #DDBB97;
            box-shadow: inset 0 4px 10px rgba(255,255,255,0.4), 0 8px 16px -4px rgba(221,187,151,0.4);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased selection:bg-pink-200">

    <nav class="bg-[#F7F4EF]/80 backdrop-blur-md border-b border-[#E6DFD3] sticky top-0 z-50 px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-[#CDEEFF] w-12 h-12 rounded-2xl flex items-center justify-center text-[#4A90E2] shadow-sm border border-[#B3E0FF]">
                    <i class="fa-solid fa-bookmark text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-800 tracking-tight text-slate-900">College Library Hub</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Your Cozy Study Sanctuary</p>
                </div>
            </div>
            <div class="bg-[#ECEFF1] border border-slate-200 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)] animate-pulse"></span>
                <span class="text-[10px] font-800 text-slate-500 uppercase tracking-wider">Live Connection Active</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-6 rounded-3xl aesthetic-shadow relative overflow-hidden">
                <div class="mb-6 flex justify-between items-center">
                    <div>
                        <h2 class="text-lg font-800 text-slate-900 flex items-center gap-2">
                            <i class="fa-solid fa-compass text-pink-400"></i> Reading Room Blueprint
                        </h2>
                        <p class="text-xs text-slate-500 mt-0.5">Real-time room architecture—pick an open spot</p>
                    </div>
                </div>

                <div class="border-2 border-dashed border-[#E6DFD3] rounded-2xl p-8 bg-[#FDFBF7]/60 flex flex-col items-center justify-center relative min-h-[350px]">
                    <div class="absolute top-0 left-1/4 right-1/4 h-2 bg-[#ECEFF1] rounded-b-md flex items-center justify-center"><span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Main Glass Arches</span></div>
                    
                    <div id="library-table" class="wood-grain w-44 h-64 rounded-3xl relative flex flex-col items-center justify-center z-10 transition-all duration-500">
                        <div class="text-[9px] font-800 text-[#8B6B4F] uppercase tracking-widest bg-white/40 px-3 py-1 rounded-full border border-white/20">Oak Wood Bay</div>
                        
                        <div id="visual-chairs-mesh"></div>
                    </div>

                    <div class="absolute bottom-4 right-4 flex items-center gap-1 text-slate-300 font-mono text-[10px]">
                        <i class="fa-solid fa-seedling text-emerald-300 text-base animate-bounce"></i> Cozy Corner
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-6 rounded-3xl aesthetic-shadow">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <div>
                        <h2 class="text-lg font-800 text-slate-900 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles text-sky-400"></i> Discover Materials
                        </h2>
                        <p class="text-xs text-slate-500 mt-0.5">Type to filter through boutique knowledge cards</p>
                    </div>

                    <div class="relative w-full sm:w-72">
                        <i class="fa-solid fa-paper-plane absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input id="catalog-search" type="text" oninput="executeLiveSearch()" placeholder="Search titles, authors, rows..." class="w-full pl-10 pr-4 py-3 bg-[#FDFBF7] border border-[#E6DFD3] rounded-2xl text-xs text-slate-800 placeholder:text-slate-400 focus:outline-none focus:border-sky-400 focus:ring-4 focus:ring-sky-100 transition-all font-medium aesthetic-shadow">
                    </div>
                </div>

                <div id="student-books-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://college-library-hub.onrender.com';
        const socket = io(BACKEND_URL);

        document.addEventListener("DOMContentLoaded", () => {
            fetchLiveSeatsMesh();
            fetchLiveBooksCatalog();
        });

        // =========================================================================
        // 🪑 LIVE AESTHETIC VISUAL SEAT ARCHITECTURE
        // =========================================================================
        async function fetchLiveSeatsMesh() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/seats`);
                const seats = await response.json();
                const container = document.getElementById('visual-chairs-mesh');
                container.innerHTML = '';

                // Map absolute CSS spatial layout anchors relative to our Big Wooden Table
                const layoutCoordinates = [
                    { top: '10%', left: '-55px' },   // Seat 1 (Left Side Top)
                    { top: '40%', left: '-55px' },   // Seat 2 (Left Side Mid)
                    { top: '70%', left: '-55px' },   // Seat 3 (Left Side Bottom)
                    { top: '25%', right: '-55px' },  // Seat 4 (Right Side Top)
                    { top: '55%', right: '-55px' }   // Seat 5 (Right Side Bottom)
                ];

                seats.forEach((seat, idx) => {
                    const occupied = seat.is_occupied;
                    const position = layoutCoordinates[idx] || { top: '0px', left: '0px' };
                    
                    const chairWrapper = document.createElement('div');
                    chairWrapper.className = "absolute w-12 h-12 flex items-center justify-center transition-all duration-500 ease-out z-20";
                    
                    // Inject position properties
                    if (position.left) chairWrapper.style.left = position.left;
                    if (position.right) chairWrapper.style.right = position.right;
                    chairWrapper.style.top = position.top;

                    // Creative Layout state: Occupied shifts out and turns pink, open pulls neat and sky-blue
                    chairWrapper.innerHTML = `
                        <div class="w-10 h-10 rounded-xl border flex flex-col items-center justify-center transition-all duration-500 shadow-md ${
                            occupied 
                            ? 'bg-[#FFD2E2] border-[#FFAEC9] text-[#D84A75] translate-x-[-4px] scale-105 shadow-pink-200' 
                            : 'bg-[#CDEEFF] border-[#B3E0FF] text-[#3A78C4] hover:bg-[#B3E0FF] shadow-sky-100'
                        }">
                            <i class="fa-solid ${occupied ? 'fa-user-ninja' : 'fa-chair'} text-sm transition-transform duration-500"></i>
                            <span class="text-[7px] font-black uppercase font-mono mt-0.5">${seat.seat_number}</span>
                        </div>
                    `;
                    container.appendChild(chairWrapper);
                });
            } catch (error) { console.error("Visual seat map rendering break:", error); }
        }

        // =========================================================================
        // 📚 INTERACTIVE SLICK BOOK CARD DECK DESK
        // =========================================================================
        async function fetchLiveBooksCatalog(searchQuery = '') {
            try {
                const url = searchQuery 
                    ? `${BACKEND_URL}/api/books?search=${encodeURIComponent(searchQuery)}`
                    : `${BACKEND_URL}/api/books`;

                const response = await fetch(url);
                const books = await response.json();
                const container = document.getElementById('student-books-container');
                container.innerHTML = '';

                if (books.length === 0) {
                    container.className = "flex flex-col items-center justify-center py-16 col-span-full text-center border-2 border-dashed border-[#E6DFD3] rounded-3xl bg-[#FDFBF7]";
                    container.innerHTML = `
                        <div class="text-[#E6DFD3] text-5xl mb-4"><i class="fa-solid fa-ghost"></i></div>
                        <p class="text-sm font-800 text-slate-700">No matching materials found</p>
                        <p class="text-xs text-slate-400 mt-1">Try another keyword or row code location</p>
                    `;
                    return;
                }

                container.className = "grid grid-cols-1 md:grid-cols-2 gap-5";

                books.forEach(book => {
                    const available = book.is_available;
                    const card = document.createElement('div');
                    
                    // High-tier boutique bookstore card style structure
                    card.className = "bg-[#FDFBF7] border border-[#E6DFD3] p-5 rounded-2xl flex flex-col justify-between hover:border-slate-300 hover:-translate-y-1 transition-all duration-300 group aesthetic-shadow relative overflow-hidden";
                    
                    card.innerHTML = `
                        <div class="absolute top-0 right-4 w-8 h-10 flex items-center justify-center text-[8px] font-900 tracking-wider uppercase text-white rounded-b-md shadow-sm ${
                            available ? 'bg-[#98D8C8]' : 'bg-[#FF9AA2]'
                        }">
                            <span class="rotate-0">${available ? 'OK' : 'OUT'}</span>
                        </div>

                        <div>
                            <span class="text-[8px] uppercase tracking-widest font-800 text-slate-400 font-mono bg-slate-100 px-2 py-0.5 rounded-md">Shelf Inventory</span>
                            <h3 class="font-800 text-slate-900 text-sm mt-2 mb-1 group-hover:text-[#4A90E2] transition-colors leading-snug pr-6">${book.title}</h3>
                            <p class="text-xs text-slate-500 font-medium">By ${book.author}</p>
                        </div>
                        
                        <div class="flex items-center justify-between pt-4 border-t border-[#F5F1E9] mt-5">
                            <span class="text-[9px] bg-[#ECEFF1] border border-slate-200 font-bold rounded-xl px-3 py-1 text-slate-600 flex items-center gap-1.5">
                                <i class="fa-solid fa-map-pin text-slate-400"></i> ${book.shelf_location}
                            </span>
                            <span class="text-[10px] font-800 tracking-tight ${available ? 'text-[#3AA487]' : 'text-slate-400'}">
                                ${available ? 'Available Now' : 'Issued Out'}
                            </span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error("Catalog loop execution failure:", error); }
        }

        let searchTimeout;
        function executeLiveSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('catalog-search').value.trim();
            searchTimeout = setTimeout(() => {
                fetchLiveBooksCatalog(query);
            }, 250);
        }

        // =========================================================================
        // 🔌 BROADCAST EVENT MATRIX SOCKET CHANNELS
        // =========================================================================
        socket.on('seatUpdated', () => {
            fetchLiveSeatsMesh();
        });

        socket.on('bookUpdated', () => {
            const currentQuery = document.getElementById('catalog-search').value.trim();
            fetchLiveBooksCatalog(currentQuery);
        });
    </script>
</body>
</html>
