<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Library Hub | Student Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFBF7;
            background-image: linear-gradient(#F5F1E9 1px, transparent 1px), linear-gradient(90deg, #F5F1E9 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Premium scrollbars for scrolling through high capacity layouts */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #F7F4EF; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #E6DFD3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        .aesthetic-shadow {
            box-shadow: 0px 16px 36px -6px rgba(215, 204, 188, 0.4);
        }
        .wood-grain {
            background: #EEDCC5;
            border: 3px solid #DDBB97;
            box-shadow: inset 0 4px 12px rgba(255,255,255,0.5), 0 8px 16px -4px rgba(221,187,151,0.2);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased selection:bg-pink-200">

    <nav class="bg-[#F7F4EF]/90 backdrop-blur-md border-b border-[#E6DFD3] sticky top-0 z-50 px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-[#CDEEFF] w-12 h-12 rounded-2xl flex items-center justify-center text-[#4A90E2] shadow-sm border border-[#B3E0FF]">
                    <i class="fa-solid fa-bookmark text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-800 tracking-tight text-slate-900">College Library Hub</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Your Cozy Study Sanctuary</p>
                </div>
            </div>
            <div class="bg-[#ECEFF1] border border-slate-200 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)] animate-pulse"></span>
                <span class="text-[10px] font-800 text-slate-500 uppercase tracking-wider">Live Connection Active</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-6 rounded-3xl aesthetic-shadow relative overflow-hidden">
                <div class="mb-4 flex justify-between items-center">
                    <div>
                        <h2 class="text-lg font-800 text-slate-900 flex items-center gap-2">
                            <i class="fa-solid fa-compass text-pink-400"></i> Reading Room Map
                        </h2>
                        <p class="text-xs text-slate-500 mt-0.5">Real-time modular floorplan — 70 seat configuration matrix</p>
                    </div>
                </div>

                <div class="border-2 border-dashed border-[#E6DFD3] rounded-2xl p-6 bg-[#FDFBF7]/60 relative max-h-[520px] overflow-y-auto select-none space-y-12 flex flex-col items-center">
                    
                    <div id="library-bays-container" class="w-full space-y-16 py-4 flex flex-col items-center"></div>

                    <div class="w-full text-center text-slate-300 font-mono text-[9px] pt-4 border-t border-[#F5F1E9]">
                        <i class="fa-solid fa-seedling text-emerald-400 text-sm animate-bounce mr-1"></i> Multi-Bay Hub Operational
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-6 rounded-3xl aesthetic-shadow">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <div class="flex gap-3">
                        <div class="mt-1 text-sky-400"><i class="fa-solid fa-wand-magic-sparkles text-xl"></i></div>
                        <div>
                            <h2 class="text-lg font-800 text-slate-900">Discover Materials</h2>
                            <p class="text-xs text-slate-500 mt-0.5">Type to filter through boutique knowledge cards</p>
                        </div>
                    </div>

                    <div class="relative w-full sm:w-72">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input id="catalog-search" type="text" oninput="executeLiveSearch()" placeholder="Search titles, authors, shelves..." class="w-full pl-10 pr-4 py-3 bg-[#FDFBF7] border border-[#E6DFD3] rounded-2xl text-xs text-slate-800 placeholder:text-slate-400 focus:outline-none focus:border-sky-400 focus:ring-4 focus:ring-sky-100 transition-all font-medium shadow-inner">
                    </div>
                </div>

                <div id="student-books-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://college-library-hub.onrender.com';
        const socket = io(BACKEND_URL);

        document.addEventListener("DOMContentLoaded", () => {
            fetchLiveHighCapacitySeats();
            fetchLiveBooksCatalog();
        });

        // =========================================================================
        // 🪑 PROGRAMMATIC MULTI-BAY CLUSTER MATRIX GENERATOR
        // =========================================================================
        async function fetchLiveHighCapacitySeats() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/seats`);
                const seats = await response.json();
                const mainContainer = document.getElementById('library-bays-container');
                mainContainer.innerHTML = '';

                // Group seats programmatically into clusters of 10 seats per desk workbench
                const seatsPerTable = 10;
                const totalTables = Math.ceil(seats.length / seatsPerTable);

                // Spatial coordinates relative to a single table box for a balanced layout profile
                const relativeChairCoordinates = [
                    { top: '8%',  left: '-40px' },   // Chair 1 (Left row)
                    { top: '26%', left: '-40px' },   // Chair 2
                    { top: '44%', left: '-40px' },   // Chair 3
                    { top: '62%', left: '-40px' },   // Chair 4
                    { top: '80%', left: '-40px' },   // Chair 5
                    { top: '8%',  right: '-40px' },  // Chair 6 (Right row)
                    { top: '26%', right: '-40px' },  // Chair 7
                    { top: '44%', right: '-40px' },  // Chair 8
                    { top: '62%', right: '-40px' },  // Chair 9
                    { top: '80%', right: '-40px' }   // Chair 10
                ];

                for (let t = 0; t < totalTables; t++) {
                    const tableWrapper = document.createElement('div');
                    tableWrapper.className = "wood-grain w-52 h-80 rounded-3xl relative flex items-center justify-center shrink-0 mb-4 animate-fade-in";
                    
                    tableWrapper.innerHTML = `
                        <div class="absolute inset-y-0 w-[2px] bg-[#DDBB97]/50 left-1/2 -translate-x-1/2 pointer-events-none"></div>
                        <div class="absolute inset-x-0 h-[2px] bg-[#DDBB97]/50 top-1/2 -translate-y-1/2 pointer-events-none"></div>
                        
                        <div class="text-[8px] font-900 text-[#8B6B4F] uppercase tracking-widest bg-[#FDFBF7]/95 px-3 py-1.5 rounded-full border border-[#DDBB97]/40 z-10 shadow-sm font-mono select-none">
                            Study Section ${String.fromCharCode(65 + t)}
                        </div>
                    `;

                    // Slice the database response array into segments matching this workspace table index scope
                    const tableSeatsSlice = seats.slice(t * seatsPerTable, (t + 1) * seatsPerTable);

                    tableSeatsSlice.forEach((seat, idx) => {
                        const occupied = seat.is_occupied;
                        const position = relativeChairCoordinates[idx] || { top: '0px', left: '0px' };

                        const chairDiv = document.createElement('div');
                        chairDiv.className = "absolute w-10 h-10 flex items-center justify-center transition-all duration-500 ease-out z-20 pointer-events-auto";
                        
                        if (position.left) chairDiv.style.left = position.left;
                        if (position.right) chairDiv.style.right = position.right;
                        chairDiv.style.top = position.top;

                        chairDiv.innerHTML = `
                            <div class="w-9 h-9 rounded-xl border-2 flex flex-col items-center justify-center transition-all duration-500 shadow-md ${
                                occupied 
                                ? 'bg-[#FFD2E2] border-[#FFAEC9] text-[#D84A75] scale-105 shadow-pink-100' 
                                : 'bg-[#CDEEFF] border-[#B3E0FF] text-[#3A78C4] hover:bg-[#B3E0FF] shadow-sky-50'
                            }">
                                <i class="fa-solid ${occupied ? 'fa-user-tag text-[10px]' : 'fa-chair text-xs'}"></i>
                                <span class="text-[6px] font-black uppercase font-mono mt-0.5">${seat.seat_number}</span>
                            </div>
                        `;
                        tableWrapper.appendChild(chairDiv);
                    });

                    mainContainer.appendChild(tableWrapper);
                }
            } catch (error) { console.error("High Capacity matrix pull loop block split fault:", error); }
        }

        // =========================================================================
        // 📚 INTUITIVE DISCOVERY CATALOG ENGINE
        // =========================================================================
        async function fetchLiveBooksCatalog(searchQuery = '') {
            try {
                const url = searchQuery 
                    ? `${BACKEND_URL}/api/books?search=${encodeURIComponent(searchQuery)}`
                    : `${BACKEND_URL}/api/books`;

                const response = await fetch(url);
                const books = await response.json();
                const container = document.getElementById('student-books-container');
                container.innerHTML = '';

                if (books.length === 0) {
                    container.className = "flex flex-col items-center justify-center py-16 col-span-full text-center border-2 border-dashed border-[#E6DFD3] rounded-3xl bg-[#FDFBF7]";
                    container.innerHTML = `
                        <div class="text-[#E6DFD3] text-5xl mb-4"><i class="fa-solid fa-ghost"></i></div>
                        <p class="text-sm font-800 text-slate-700">No matching materials found</p>
                        <p class="text-xs text-slate-400 mt-1">Try another keyword or row code location</p>
                    `;
                    return;
                }

                container.className = "grid grid-cols-1 md:grid-cols-2 gap-5";

                books.forEach(book => {
                    const available = book.is_available;
                    const card = document.createElement('div');
                    
                    card.className = "bg-[#FDFBF7] border border-[#E6DFD3] pt-7 px-5 pb-5 rounded-2xl flex flex-col justify-between hover:border-[#CBD5E1] hover:-translate-y-1 hover:shadow-2xl transition-all duration-300 group relative overflow-hidden bg-gradient-to-b from-[#FDFBF7] to-[#F7F4EF]/30 aesthetic-shadow";
                    
                    card.innerHTML = `
                        <div class="absolute top-0 right-4 w-8 h-9 flex items-center justify-center text-[8px] font-900 tracking-wider uppercase text-white rounded-b-md shadow-sm transition-all duration-300 group-hover:h-10 ${
                            available ? 'bg-[#98D8C8]' : 'bg-[#FF9AA2]'
                        }">
                            <span>${available ? 'OK' : 'OUT'}</span>
                        </div>

                        <div>
                            <span class="text-[8px] uppercase tracking-widest font-800 text-slate-400 font-mono bg-[#ECEFF1] px-2 py-0.5 rounded">Catalog Asset</span>
                            <h3 class="font-800 text-slate-900 text-sm mt-2.5 mb-1 group-hover:text-[#4A90E2] transition-colors leading-snug pr-6 tracking-tight">${book.title}</h3>
                            <p class="text-xs text-slate-500 font-medium">By ${book.author}</p>
                        </div>
                        
                        <div class="flex items-center justify-between pt-4 border-t border-[#F5F1E9] mt-5">
                            <span class="text-[9px] bg-[#FDFBF7] border border-[#E6DFD3] font-bold rounded-xl px-3 py-1 text-slate-600 flex items-center gap-1.5 shadow-inner">
                                <i class="fa-solid fa-map-pin text-[#4A90E2]/60"></i> ${book.shelf_location}
                            </span>
                            <span class="text-[10px] font-800 tracking-tight ${available ? 'text-[#3AA487]' : 'text-slate-400'}">
                                ${available ? 'Available Now' : 'Issued Out'}
                            </span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error("Catalog execution query fault loop:", error); }
        }

        let searchTimeout;
        function executeLiveSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('catalog-search').value.trim();
            searchTimeout = setTimeout(() => {
                fetchLiveBooksCatalog(query);
            }, 250);
        }

        // =========================================================================
        // 🔌 REACTION EVENT BROADCAST CHANNELS SOCKET MAPS
        // =========================================================================
        socket.on('seatUpdated', () => { fetchLiveHighCapacitySeats(); });
        socket.on('bookUpdated', () => {
            const currentQuery = document.getElementById('catalog-search').value.trim();
            fetchLiveBooksCatalog(currentQuery);
        });
    </script>
</body>
</html>
