<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Library Hub | Immersive Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFBF7;
            background-image: linear-gradient(#F5F1E9 1px, transparent 1px), linear-gradient(90deg, #F5F1E9 1px, transparent 1px);
            background-size: 24px 24px;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F7F4EF; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #E6DFD3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        .aesthetic-shadow {
            box-shadow: 0px 20px 48px -8px rgba(215, 204, 188, 0.5);
        }
        .wood-grain {
            background: #EEDCC5;
            border: 3px solid #DDBB97;
            box-shadow: inset 0 4px 12px rgba(255,255,255,0.5), 0 16px 32px -8px rgba(221,187,151,0.25);
        }
        .ripple-pulse {
            animation: ripple 2s infinite ease-out;
        }
        @keyframes ripple {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(58, 120, 196, 0.3); }
            70% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 12px rgba(58, 120, 196, 0); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(58, 120, 196, 0); }
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased selection:bg-pink-200 overflow-x-hidden">

    <nav class="bg-[#F7F4EF]/90 backdrop-blur-md border-b border-[#E6DFD3] sticky top-0 z-50 px-6 sm:px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-gradient-to-tr from-[#CDEEFF] to-[#B3E0FF] w-12 h-12 rounded-2xl flex items-center justify-center text-[#3A78C4] shadow-sm border border-[#B3E0FF]">
                    <i class="fa-solid fa-bolt-lightning text-lg animate-pulse"></i>
                </div>
                <div>
                    <h1 class="text-xl font-800 tracking-tight text-slate-900 leading-tight">College Library Hub</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Your Cozy Study Sanctuary</p>
                </div>
            </div>
            <div class="bg-[#ECEFF1] border border-slate-200 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)] animate-pulse"></span>
                <span class="text-[10px] font-800 text-slate-500 uppercase tracking-wider font-mono">Matrix Sync</span>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto p-4 sm:p-6 pb-0">
        <div class="bg-gradient-to-r from-[#F7F4EF] via-[#FDFBF7] to-[#F7F4EF] border-2 border-white rounded-3xl p-6 aesthetic-shadow flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden group">
            <div class="absolute -right-16 -top-16 w-36 h-36 bg-pink-100/30 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex items-center gap-5 w-full md:w-auto">
                <div class="bg-[#FFD2E2] w-14 h-14 rounded-2xl flex items-center justify-center text-[#D84A75] border border-[#FFAEC9] shrink-0 shadow-sm">
                    <i class="fa-solid fa-chart-simple text-xl"></i>
                </div>
                <div>
                    <h2 class="text-base font-800 text-slate-900">Live Space Radar Analytics</h2>
                    <div class="flex flex-wrap items-center gap-3 mt-1.5 text-xs text-slate-500 font-medium">
                        <span id="hud-total-busy" class="bg-pink-50 border border-pink-100 text-[#D84A75] px-2.5 py-1 rounded-xl font-bold flex items-center gap-1.5"><i class="fa-solid fa-user-lock"></i> 0 Busy</span>
                        <span id="hud-total-open" class="bg-emerald-50 border border-emerald-100 text-emerald-600 px-2.5 py-1 rounded-xl font-bold flex items-center gap-1.5"><i class="fa-solid fa-circle-check"></i> 0 Open</span>
                    </div>
                </div>
            </div>
            
            <button onclick="executeMagicSeatMatch()" class="w-full md:w-auto bg-gradient-to-r from-[#3A78C4] to-[#4A90E2] hover:from-[#4A90E2] hover:to-[#3A78C4] text-white font-800 text-sm px-6 py-4 rounded-2xl shadow-xl shadow-sky-200 transition-all duration-300 transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2 group-hover:scale-[1.02]">
                <i class="fa-solid fa-wand-magic-sparkles text-xs animate-spin" style="animation-duration: 3s;"></i> ✨ Find Me an Open Seat Now
            </button>
        </div>
    </header>

    <div class="flex justify-center p-4 lg:hidden sticky top-[73px] z-40 bg-[#FDFBF7]/40 backdrop-blur-sm">
        <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-1.5 rounded-2xl flex gap-1 aesthetic-shadow">
            <button id="toggle-seats-btn" onclick="switchMobileTab('seats')" class="px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 bg-[#CDEEFF] border border-[#B3E0FF] text-[#3A78C4]">
                <i class="fa-solid fa-compass"></i> Reading Room
            </button>
            <button id="toggle-books-btn" onclick="switchMobileTab('books')" class="px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 text-slate-500 hover:text-slate-800">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Discovery Catalogue
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
        
        <div id="seats-panel" class="lg:col-span-5 space-y-6 block transition-all duration-300">
            <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-5 sm:p-6 rounded-3xl aesthetic-shadow relative overflow-hidden">
                <div class="mb-5 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <div>
                        <h2 class="text-base font-800 text-slate-900 flex items-center gap-2">
                            <i class="fa-solid fa-compass text-pink-400"></i> Zone Architecture Matrix
                        </h2>
                        <p class="text-xs text-slate-400 mt-0.5">Filter space map instantly by floor sectors</p>
                    </div>
                </div>

                <div class="bg-[#FDFBF7]/80 border border-[#E6DFD3] p-1 rounded-xl flex gap-1 mb-6 overflow-x-auto select-none no-scrollbar">
                    <button id="zone-btn-all" onclick="filterRadarZone('all')" class="px-3.5 py-1.5 rounded-lg text-[11px] font-800 transition-all duration-200 whitespace-nowrap bg-slate-900 text-white shadow-sm">All Sections</button>
                    <button id="zone-btn-main" onclick="filterRadarZone('main')" class="px-3.5 py-1.5 rounded-lg text-[11px] font-800 transition-all duration-200 whitespace-nowrap text-slate-500 hover:text-slate-800">🌳 Oak Center</button>
                    <button id="zone-btn-quiet" onclick="filterRadarZone('quiet')" class="px-3.5 py-1.5 rounded-lg text-[11px] font-800 transition-all duration-200 whitespace-nowrap text-slate-500 hover:text-slate-800">🤫 Silent Pods</button>
                </div>

                <div class="border-2 border-dashed border-[#E6DFD3] rounded-2xl p-4 sm:p-6 bg-[#FDFBF7]/60 relative max-h-[500px] overflow-y-auto select-none space-y-12 flex flex-col items-center">
                    <div id="library-bays-container" class="w-full space-y-16 py-4 flex flex-col items-center transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <div id="books-panel" class="lg:col-span-7 space-y-6 hidden lg:block transition-all duration-300">
            <div class="bg-[#F7F4EF] border border-[#E6DFD3] p-5 sm:p-6 rounded-3xl aesthetic-shadow">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <div>
                        <h2 class="text-base font-800 text-slate-900 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles text-sky-400"></i> Boutique Discovery Desk
                        </h2>
                        <p class="text-xs text-slate-400 mt-0.5">Fluid intelligence filter — type subject tokens</p>
                    </div>

                    <div class="relative w-full sm:w-72">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input id="catalog-search" type="text" oninput="executeLiveSearch()" placeholder="Type a title, author name or shelf row..." class="w-full pl-10 pr-4 py-3 bg-[#FDFBF7] border border-[#E6DFD3] rounded-2xl text-xs text-slate-800 placeholder:text-slate-400 focus:outline-none focus:border-sky-400 focus:ring-4 focus:ring-sky-100 transition-all font-medium shadow-inner">
                    </div>
                </div>

                <div id="student-books-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://college-library-hub.onrender.com';
        const socket = io(BACKEND_URL);

        let systemSeatsArray = [];
        let globalCurrentZoneFilter = 'all';

        document.addEventListener("DOMContentLoaded", () => {
            fetchSystemRadarData();
            fetchLiveBooksCatalog();
        });

        // =========================================================================
        // 🛰️ MASTER SPACE DATA ENGINE LAYER
        // =========================================================================
        async function fetchSystemRadarData() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/seats`);
                systemSeatsArray = await response.json();
                
                calculateHUDAnalytics(systemSeatsArray);
                renderModularZoneGrid(systemSeatsArray);
            } catch(e) { console.error("Radar pull fail:", e); }
        }

        function calculateHUDAnalytics(seats) {
            const busy = seats.filter(s => s.is_occupied).length;
            const open = seats.length - busy;
            
            document.getElementById('hud-total-busy').innerHTML = `<i class="fa-solid fa-user-lock"></i> ${busy} Busy Seats`;
            document.getElementById('hud-total-open').innerHTML = `<i class="fa-solid fa-circle-check"></i> ${open} Open Spots`;
        }

        // =========================================================================
        // 🪑 scalABLE GRID CLUSTER ROUTINES WITH ZONE FILTER MATRIX
        // =========================================================================
        function renderModularZoneGrid(seats) {
            const mainContainer = document.getElementById('library-bays-container');
            mainContainer.innerHTML = '';

            const seatsPerTable = 10;
            const totalTables = Math.ceil(seats.length / seatsPerTable);

            const relativeChairCoordinates = [
                { top: '8%',  left: '-40px' }, { top: '26%', left: '-40px' }, { top: '44%', left: '-40px' }, { top: '62%', left: '-40px' }, { top: '80%', left: '-40px' },
                { top: '8%',  right: '-40px' }, { top: '26%', right: '-40px' }, { top: '44%', right: '-40px' }, { top: '62%', right: '-40px' }, { top: '80%', right: '-40px' }
            ];

            for (let t = 0; t < totalTables; t++) {
                // Semantic zone segmentation categorization logic
                let tableZone = 'main'; // Section A-C (Tables 0-2) -> Oak Center
                let zoneLabelText = '🌳 Oak Center';
                
                if (t >= 3) { tableZone = 'quiet'; zoneLabelText = '🤫 Silent Pods'; } // Section D-G -> Silent Pods

                // Filter gate validation engine block
                if (globalCurrentZoneFilter !== 'all' && globalCurrentZoneFilter !== tableZone) continue;

                const tableWrapper = document.createElement('div');
                tableWrapper.className = "wood-grain w-52 h-80 rounded-3xl relative flex items-center justify-center shrink-0 mb-4 transition-all duration-500 animate-fade-in";
                tableWrapper.id = `visual-table-block-${t}`;
                
                tableWrapper.innerHTML = `
                    <div class="absolute inset-y-0 w-[2px] bg-[#DDBB97]/50 left-1/2 -translate-x-1/2 pointer-events-none"></div>
                    <div class="absolute inset-x-0 h-[2px] bg-[#DDBB97]/50 top-1/2 -translate-y-1/2 pointer-events-none"></div>
                    <div class="text-[8px] font-900 text-[#8B6B4F] uppercase tracking-widest bg-[#FDFBF7]/95 px-3 py-1.5 rounded-full border border-[#DDBB97]/40 z-10 shadow-sm font-mono flex flex-col items-center gap-0.5">
                        <span>Section ${String.fromCharCode(65 + t)}</span>
                        <span class="text-[6px] text-slate-400 font-sans tracking-normal lowercase font-normal">${zoneLabelText}</span>
                    </div>
                `;

                const tableSeatsSlice = seats.slice(t * seatsPerTable, (t + 1) * seatsPerTable);

                tableSeatsSlice.forEach((seat, idx) => {
                    const occupied = seat.is_occupied;
                    const position = relativeChairCoordinates[idx];

                    const chairDiv = document.createElement('div');
                    chairDiv.className = "absolute w-10 h-10 flex items-center justify-center transition-all duration-500 ease-out z-20";
                    chairDiv.id = `chair-node-anchor-${seat.seat_number}`;
                    
                    if (position.left) chairDiv.style.left = position.left;
                    if (position.right) chairDiv.style.right = position.right;
                    chairDiv.style.top = position.top;

                    chairDiv.innerHTML = `
                        <div class="w-9 h-9 rounded-xl border-2 flex flex-col items-center justify-center transition-all duration-300 shadow-md ${
                            occupied 
                            ? 'bg-[#FFD2E2] border-[#FFAEC9] text-[#D84A75] scale-105 shadow-pink-100' 
                            : 'bg-[#CDEEFF] border-[#B3E0FF] text-[#3A78C4] shadow-sky-50'
                        }">
                            <i class="fa-solid ${occupied ? 'fa-user-tag text-[10px]' : 'fa-chair text-xs'}"></i>
                            <span class="text-[6px] font-black uppercase font-mono mt-0.5">${seat.seat_number}</span>
                        </div>
                    `;
                    tableWrapper.appendChild(chairDiv);
                });

                mainContainer.appendChild(tableWrapper);
            }
        }

        // =========================================================================
        // 🧠 LAZINESS ELIMINATION INTERACTIVE CORE ROUTINES
        // =========================================================================
        function filterRadarZone(zone) {
            globalCurrentZoneFilter = zone;
            
            const buttons = ['all', 'main', 'quiet'];
            buttons.forEach(b => {
                const btn = document.getElementById(`zone-btn-${b}`);
                if (b === zone) {
                    btn.className = "px-3.5 py-1.5 rounded-lg text-[11px] font-800 transition-all duration-200 whitespace-nowrap bg-slate-900 text-white shadow-sm";
                } else {
                    btn.className = "px-3.5 py-1.5 rounded-lg text-[11px] font-800 transition-all duration-200 whitespace-nowrap text-slate-500 hover:text-slate-800";
                }
            });

            renderModularZoneGrid(systemSeatsArray);
        }

        function executeMagicSeatMatch() {
            const firstOpenSeat = systemSeatsArray.find(s => !s.is_occupied);
            if (!firstOpenSeat) {
                alert("The grid is entirely full right now! Hold tight for a live node broadcast open signal.");
                return;
            }

            // If user is currently running a mobile panel configuration, force jump focus straight to the map view
            if(window.innerWidth < 1024) switchMobileTab('seats');

            // Deduce what section table cluster bucket this seat item belongs to
            const tableIndex = Math.floor((firstOpenSeat.seat_number - 1) / 10);
            const targetZone = tableIndex >= 3 ? 'quiet' : 'main';

            // Override zone restrictions instantly to prevent focus misses
            if (globalCurrentZoneFilter !== 'all' && globalCurrentZoneFilter !== targetZone) {
                filterRadarZone('all');
            }

            setTimeout(() => {
                const chairCardElement = document.getElementById(`chair-node-anchor-${firstOpenSeat.seat_number}`);
                if (chairCardElement) {
                    chairCardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    const innerBox = chairCardElement.firstElementChild;
                    innerBox.classList.add('ripple-pulse', 'border-sky-500', 'scale-110');
                    
                    setTimeout(() => {
                        innerBox.classList.remove('ripple-pulse', 'border-sky-500', 'scale-110');
                    }, 4000);
                }
            }, 300);
        }

        // =========================================================================
        // 📚 AUTO-TINT BOUTIQUE BOOK CATALOG SYSTEM
        // =========================================================================
        async function fetchLiveBooksCatalog(searchQuery = '') {
            try {
                const url = searchQuery 
                    ? `${BACKEND_URL}/api/books?search=${encodeURIComponent(searchQuery)}`
                    : `${BACKEND_URL}/api/books`;

                const response = await fetch(url);
                const books = await response.json();
                const container = document.getElementById('student-books-container');
                container.innerHTML = '';

                if (books.length === 0) {
                    container.className = "flex flex-col items-center justify-center py-16 col-span-full text-center border-2 border-dashed border-[#E6DFD3] rounded-3xl bg-[#FDFBF7]";
                    container.innerHTML = `
                        <div class="text-[#E6DFD3] text-5xl mb-4"><i class="fa-solid fa-ghost"></i></div>
                        <p class="text-sm font-800 text-slate-700">No matching materials found</p>
                        <p class="text-xs text-slate-400 mt-1">Try another keyword or row code location</p>
                    `;
                    return;
                }

                container.className = "grid grid-cols-1 md:grid-cols-2 gap-5";

                books.forEach(book => {
                    const available = book.is_available;
                    const titleLower = book.title.toLowerCase();
                    
                    // High intelligence custom canvas coloration algorithm routine
                    let themeClass = "from-[#FDFBF7] to-[#F7F4EF]/30";
                    let tokenBadgeBg = "bg-[#ECEFF1] text-slate-600";
                    
                    if (titleLower.includes('algorithm') || titleLower.includes('python')) {
                        themeClass = "from-[#FDFBF7] via-[#FDFBF7] to-purple-50/40 hover:to-purple-50/90";
                        tokenBadgeBg = "bg-purple-50 border border-purple-100 text-purple-600";
                    } else if (titleLower.includes('physics')) {
                        themeClass = "from-[#FDFBF7] via-[#FDFBF7] to-sky-50/40 hover:to-sky-50/90";
                        tokenBadgeBg = "bg-sky-50 border border-sky-100 text-[#3A78C4]";
                    }

                    const card = document.createElement('div');
                    card.className = `bg-[#FDFBF7] border border-[#E6DFD3] pt-7 px-5 pb-5 rounded-2xl flex flex-col justify-between hover:border-[#CBD5E1] hover:-translate-y-1 hover:shadow-2xl transition-all duration-300 group relative overflow-hidden bg-gradient-to-b ${themeClass} aesthetic-shadow`;
                    
                    card.innerHTML = `
                        <div class="absolute top-0 right-4 w-8 h-9 flex items-center justify-center text-[8px] font-900 tracking-wider uppercase text-white rounded-b-md shadow-sm transition-all duration-300 group-hover:h-10 ${
                            available ? 'bg-[#98D8C8]' : 'bg-[#FF9AA2]'
                        }">
                            <span>${available ? 'OK' : 'OUT'}</span>
                        </div>

                        <div>
                            <span class="text-[8px] uppercase tracking-widest font-900 px-2 py-0.5 rounded-md font-mono ${tokenBadgeBg}">
                                ${titleLower.includes('physics') || titleLower.includes('algorithm') ? 'Boutique Display' : 'Catalog Asset'}
                            </span>
                            <h3 class="font-800 text-slate-900 text-sm mt-2.5 mb-1 group-hover:text-[#4A90E2] transition-colors leading-snug pr-6 tracking-tight">${book.title}</h3>
                            <p class="text-xs text-slate-500 font-medium">By ${book.author}</p>
                        </div>
                        
                        <div class="flex items-center justify-between pt-4 border-t border-[#F5F1E9] mt-5">
                            <span class="text-[9px] bg-[#FDFBF7] border border-[#E6DFD3] font-bold rounded-xl px-3 py-1 text-slate-600 flex items-center gap-1.5 shadow-inner">
                                <i class="fa-solid fa-map-pin text-[#4A90E2]/60"></i> ${book.shelf_location}
                            </span>
                            <span class="text-[10px] font-800 tracking-tight ${available ? 'text-[#3AA487]' : 'text-slate-400'}">
                                ${available ? 'Available Now' : 'Issued Out'}
                            </span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        let searchTimeout;
        function executeLiveSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('catalog-search').value.trim();
            searchTimeout = setTimeout(() => { fetchLiveBooksCatalog(query); }, 250);
        }

        // =========================================================================
        // 📱 MOBILE DISPLAY CONTAINER LAYOUT INTERCHANGES
        // =========================================================================
        function switchMobileTab(tab) {
            const seatsPanel = document.getElementById('seats-panel');
            const booksPanel = document.getElementById('books-panel');
            const seatsBtn = document.getElementById('toggle-seats-btn');
            const booksBtn = document.getElementById('toggle-books-btn');

            if (tab === 'seats') {
                seatsPanel.classList.remove('hidden'); seatsPanel.classList.add('block');
                booksPanel.classList.remove('block'); booksPanel.classList.add('hidden');
                seatsBtn.className = "px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 bg-[#CDEEFF] border border-[#B3E0FF] text-[#3A78C4]";
                booksBtn.className = "px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 text-slate-500 hover:text-slate-800";
            } else {
                seatsPanel.classList.remove('block'); seatsPanel.classList.add('hidden');
                booksPanel.classList.remove('hidden'); booksPanel.classList.add('block');
                booksBtn.className = "px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 bg-[#CDEEFF] border border-[#B3E0FF] text-[#3A78C4]";
                seatsBtn.className = "px-5 py-2.5 rounded-xl text-xs font-800 transition-all duration-300 flex items-center gap-2 text-slate-500 hover:text-slate-800";
            }
        }

        // =========================================================================
        // 🔌 REACTION SOCKET PIPELINES LISTENERS
        // =========================================================================
        socket.on('seatUpdated', () => { fetchSystemRadarData(); });
        socket.on('bookUpdated', () => {
            const currentQuery = document.getElementById('catalog-search').value.trim();
            fetchLiveBooksCatalog(currentQuery);
        });
    </script>
</body>
</html>
