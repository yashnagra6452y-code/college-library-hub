<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Library Hub | Premium Immersive Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f19;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 41, 59, 0.3) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(58, 120, 196, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(216, 74, 117, 0.08) 0, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 32px 32px, 32px 32px;
        }

        .heading-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        /* Premium Glassmorphism Depth Layering */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .premium-wood-table {
            background: linear-gradient(135deg, #1e1b18 0%, #12100e 100%);
            border: 1px solid rgba(221, 187, 151, 0.15);
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.05),
                0 12px 24px -6px rgba(0,0,0,0.7),
                0 0 0 1px rgba(0,0,0,0.5);
        }

        /* High-Stakes Neon Pulse Keyframes */
        .neon-glow-open {
            box-shadow: 0 0 20px -2px rgba(56, 189, 248, 0.25);
        }
        .neon-glow-occupied {
            box-shadow: 0 0 20px -2px rgba(244, 63, 94, 0.25);
        }

        .magic-ripple-active {
            animation: magic-glow 2.5s infinite ease-in-out;
        }

        @keyframes magic-glow {
            0%, 100% { transform: scale(1.05); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6), 0 0 30px rgba(56, 189, 248, 0.3); border-color: #38bdf8; }
            50% { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(56, 189, 248, 0), 0 0 50px rgba(56, 189, 248, 0.6); border-color: #0ea5e9; }
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen text-slate-300 antialiased selection:bg-sky-500/30 selection:text-sky-200 overflow-x-hidden">

    <nav class="bg-[#0b0f19]/75 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50 px-6 sm:px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-gradient-to-tr from-sky-500/10 to-blue-500/20 w-11 h-11 rounded-xl flex items-center justify-center text-sky-400 border border-sky-500/20 shadow-inner">
                    <i class="fa-solid fa-shapes text-base"></i>
                </div>
                <div>
                    <h1 class="text-base sm:text-lg font-700 tracking-tight text-white heading-font leading-tight">Library Matrix Hub</h1>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">Automated Core Infrastructure</p>
                </div>
            </div>
            <div class="bg-slate-900/90 border border-white/5 px-3.5 py-1.5 rounded-xl flex items-center gap-2.5 shadow-inner">
                <span class="w-1.5 h-1.5 rounded-full bg-sky-400 shadow-[0_0_10px_#38bdf8] animate-pulse"></span>
                <span class="text-[9px] font-700 text-slate-400 uppercase tracking-widest font-mono">Live Matrix Sync</span>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto p-4 sm:p-6 pb-0">
        <div class="glass-panel rounded-2xl p-6 flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
            <div class="absolute -left-10 -bottom-10 w-44 h-44 bg-sky-500/5 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="bg-slate-900/60 w-12 h-12 rounded-xl flex items-center justify-center text-slate-400 border border-white/5 shrink-0 shadow-inner">
                    <i class="fa-solid fa-satellite-dish text-base text-sky-400"></i>
                </div>
                <div>
                    <h2 class="text-sm font-700 text-white heading-font">Live Environmental Radar</h2>
                    <div class="flex flex-wrap items-center gap-2.5 mt-2 text-[11px] font-medium">
                        <span id="hud-total-busy" class="bg-rose-500/10 border border-rose-500/20 text-rose-400 px-2.5 py-1 rounded-lg font-mono flex items-center gap-1.5">0 Busy</span>
                        <span id="hud-total-open" class="bg-sky-500/10 border border-sky-500/20 text-sky-400 px-2.5 py-1 rounded-lg font-mono flex items-center gap-1.5">0 Open</span>
                    </div>
                </div>
            </div>
            
            <button onclick="executeMagicSeatMatch()" class="w-full md:w-auto bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-700 text-xs px-5 py-3.5 rounded-xl transition-all duration-300 transform active:scale-95 flex items-center justify-center gap-2 tracking-wide heading-font shadow-lg shadow-sky-500/10">
                <i class="fa-solid fa-wand-magic-sparkles text-[10px]"></i> AUTO-ALLOCATE BEST SEAT
            </button>
        </div>
    </header>

    <div class="flex justify-center p-4 lg:hidden sticky top-[69px] z-40 bg-[#0b0f19]/40 backdrop-blur-md">
        <div class="bg-slate-950/80 border border-white/5 p-1 rounded-xl flex gap-1 shadow-2xl">
            <button id="toggle-seats-btn" onclick="switchMobileTab('seats')" class="px-4 py-2 rounded-lg text-xs font-700 transition-all duration-200 flex items-center gap-2 bg-slate-800 text-white border border-white/5">
                <i class="fa-solid fa-compass text-sky-400"></i> Room Layout
            </button>
            <button id="toggle-books-btn" onclick="switchMobileTab('books')" class="px-4 py-2 rounded-lg text-xs font-700 transition-all duration-200 flex items-center gap-2 text-slate-400 hover:text-slate-200">
                <i class="fa-solid fa-book-bookmark"></i> Discover Asset
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 relative z-10">
        
        <div id="seats-panel" class="lg:col-span-5 space-y-4 block transition-all duration-300">
            <div class="glass-panel p-5 sm:p-6 rounded-2xl relative overflow-hidden">
                <div class="mb-5 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <div>
                        <h2 class="text-sm font-700 text-white heading-font flex items-center gap-2">
                            <i class="fa-solid fa-compass text-sky-400"></i> Zone Architecture Matrix
                        </h2>
                    </div>
                </div>

                <div class="bg-slate-950/60 border border-white/5 p-1 rounded-xl flex gap-1 mb-6 overflow-x-auto no-scrollbar">
                    <button id="zone-btn-all" onclick="filterRadarZone('all')" class="px-3.5 py-1.5 rounded-lg text-[10px] font-700 transition-all duration-200 whitespace-nowrap bg-sky-500/10 text-sky-400 border border-sky-400/20">All Zones</button>
                    <button id="zone-btn-main" onclick="filterRadarZone('main')" class="px-3.5 py-1.5 rounded-lg text-[10px] font-700 transition-all duration-200 whitespace-nowrap text-slate-400 hover:text-slate-200">🌳 Oak Center</button>
                    <button id="zone-btn-quiet" onclick="filterRadarZone('quiet')" class="px-3.5 py-1.5 rounded-lg text-[10px] font-700 transition-all duration-200 whitespace-nowrap text-slate-400 hover:text-slate-200">🤫 Silent Pods</button>
                </div>

                <div class="border border-white/5 rounded-xl p-6 bg-slate-950/40 relative max-h-[480px] overflow-y-auto space-y-12 flex flex-col items-center">
                    <div id="library-bays-container" class="w-full space-y-14 py-4 flex flex-col items-center"></div>
                </div>
            </div>
        </div>

        <div id="books-panel" class="lg:col-span-7 space-y-4 hidden lg:block transition-all duration-300">
            <div class="glass-panel p-5 sm:p-6 rounded-2xl">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <div>
                        <h2 class="text-sm font-700 text-white heading-font flex items-center gap-2">
                            <i class="fa-solid fa-magnifying-glass text-sky-400"></i> Digital Access Terminal
                        </h2>
                    </div>

                    <div class="relative w-full sm:w-64">
                        <i class="fa-solid fa-terminal absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 text-[10px]"></i>
                        <input id="catalog-search" type="text" oninput="executeLiveSearch()" placeholder="Search asset token registers..." class="w-full pl-9 pr-4 py-2.5 bg-slate-950/80 border border-white/5 rounded-xl text-xs text-white placeholder:text-slate-600 focus:outline-none focus:border-sky-500/40 focus:ring-1 focus:ring-sky-500/20 transition-all font-mono">
                    </div>
                </div>

                <div id="student-books-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://college-library-hub.onrender.com';
        const socket = io(BACKEND_URL);

        let systemSeatsArray = [];
        let globalCurrentZoneFilter = 'all';

        document.addEventListener("DOMContentLoaded", () => {
            fetchSystemRadarData();
            fetchLiveBooksCatalog();
        });

        async function fetchSystemRadarData() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/seats`);
                systemSeatsArray = await response.json();
                calculateHUDAnalytics(systemSeatsArray);
                renderModularZoneGrid(systemSeatsArray);
            } catch(e) { console.error(e); }
        }

        function calculateHUDAnalytics(seats) {
            const busy = seats.filter(s => s.is_occupied).length;
            const open = seats.length - busy;
            document.getElementById('hud-total-busy').innerText = `${busy} Occupied Units`;
            document.getElementById('hud-total-open').innerText = `${open} Clean Nodes`;
        }

        // =========================================================================
        // 🪑 PRECISE HIGH-ACCENT INTUITIVE BLUEPRINT GRAPHICS ENGINE
        // =========================================================================
        function renderModularZoneGrid(seats) {
            const mainContainer = document.getElementById('library-bays-container');
            mainContainer.innerHTML = '';

            const seatsPerTable = 10;
            const totalTables = Math.ceil(seats.length / seatsPerTable);

            // Fine geometric padding placements offset parameters
            const relativeChairCoordinates = [
                { top: '6%',  left: '-32px' }, { top: '25%', left: '-32px' }, { top: '44%', left: '-32px' }, { top: '63%', left: '-32px' }, { top: '82%', left: '-32px' },
                { top: '6%',  right: '-32px' }, { top: '25%', right: '-32px' }, { top: '44%', right: '-32px' }, { top: '63%', right: '-32px' }, { top: '82%', right: '-32px' }
            ];

            for (let t = 0; t < totalTables; t++) {
                let tableZone = t >= 3 ? 'quiet' : 'main';
                let zoneLabelText = t >= 3 ? 'Silent Pod Matrix' : 'Oak Center Area';
                
                if (globalCurrentZoneFilter !== 'all' && globalCurrentZoneFilter !== tableZone) continue;

                const tableWrapper = document.createElement('div');
                tableWrapper.className = "premium-wood-table w-44 h-72 rounded-2xl relative flex items-center justify-center shrink-0 my-2";
                
                tableWrapper.innerHTML = `
                    <div class="absolute inset-y-0 w-[1px] bg-white/5 left-1/2 -translate-x-1/2 pointer-events-none"></div>
                    <div class="absolute inset-x-0 h-[1px] bg-white/5 top-1/2 -translate-y-1/2 pointer-events-none"></div>
                    
                    <div class="z-10 flex flex-col items-center gap-1 bg-slate-950/90 px-3 py-2 rounded-xl border border-white/5 shadow-2xl text-center select-none">
                        <span class="text-[10px] font-bold text-white font-mono tracking-tight">SECTION ${String.fromCharCode(65 + t)}</span>
                        <span class="text-[7px] text-slate-500 font-medium tracking-wide uppercase">${zoneLabelText}</span>
                    </div>
                `;

                const tableSeatsSlice = seats.slice(t * seatsPerTable, (t + 1) * seatsPerTable);

                tableSeatsSlice.forEach((seat, idx) => {
                    const occupied = seat.is_occupied;
                    const position = relativeChairCoordinates[idx];

                    const chairDiv = document.createElement('div');
                    chairDiv.className = "absolute w-8 h-8 flex items-center justify-center transition-all duration-300 z-20";
                    chairDiv.id = `chair-node-anchor-${seat.seat_number}`;
                    
                    if (position.left) chairDiv.style.left = position.left;
                    if (position.right) chairDiv.style.right = position.right;
                    chairDiv.style.top = position.top;

                    // Neon status accenting calculation block
                    const statusClasses = occupied 
                        ? 'bg-rose-500/10 border-rose-500/30 text-rose-400 neon-glow-occupied' 
                        : 'bg-sky-500/5 border-sky-500/20 text-sky-400 neon-glow-open hover:border-sky-400/50';

                    chairDiv.innerHTML = `
                        <div class="w-7 h-7 rounded-lg border flex flex-col items-center justify-center transition-all duration-300 ${statusClasses}">
                            <span class="text-[8px] font-bold font-mono tracking-tighter">${seat.seat_number}</span>
                        </div>
                    `;
                    tableWrapper.appendChild(chairDiv);
                });

                mainContainer.appendChild(tableWrapper);
            }
        }

        // =========================================================================
        // 📚 PREMIUM BOOKSHELF REGISTERS CARD ENGINE
        // =========================================================================
        async function fetchLiveBooksCatalog(searchQuery = '') {
            try {
                const url = searchQuery 
                    ? `${BACKEND_URL}/api/books?search=${encodeURIComponent(searchQuery)}`
                    : `${BACKEND_URL}/api/books`;

                const response = await fetch(url);
                const books = await response.json();
                const container = document.getElementById('student-books-container');
                container.innerHTML = '';

                if (books.length === 0) {
                    container.className = "flex flex-col items-center justify-center py-12 col-span-full text-center border border-dashed border-white/5 rounded-xl bg-slate-950/20";
                    container.innerHTML = `
                        <div class="text-slate-700 text-3xl mb-2"><i class="fa-solid fa-circle-nodes"></i></div>
                        <p class="text-xs font-mono text-slate-500">No matching tokens found in registry catalog</p>
                    `;
                    return;
                }

                container.className = "grid grid-cols-1 md:grid-cols-2 gap-4";

                books.forEach(book => {
                    const available = book.is_available;
                    const titleLower = book.title.toLowerCase();
                    
                    // Intelligent custom edge lighting selection logic block
                    let glowBorderAccent = "hover:border-slate-700/60";
                    let rowTagColorAccent = "bg-slate-900 border-white/5 text-slate-400";
                    
                    if (titleLower.includes('algorithm') || titleLower.includes('python')) {
                        glowBorderAccent = "hover:border-purple-500/30 hover:shadow-[0_0_20px_-5px_rgba(168,85,247,0.15)]";
                        rowTagColorAccent = "bg-purple-500/5 border-purple-500/10 text-purple-400";
                    } else if (titleLower.includes('physics')) {
                        glowBorderAccent = "hover:border-sky-500/30 hover:shadow-[0_0_20px_-5px_rgba(56,189,248,0.15)]";
                        rowTagColorAccent = "bg-sky-500/5 border-sky-500/10 text-sky-400";
                    }

                    const card = document.createElement('div');
                    card.className = `bg-slate-900/40 border border-white/5 p-4 rounded-xl flex flex-col justify-between hover:-translate-y-0.5 transition-all duration-300 group relative overflow-hidden ${glowBorderAccent}`;
                    
                    card.innerHTML = `
                        <div>
                            <div class="flex items-center justify-between gap-2">
                                <span class="text-[8px] tracking-widest font-bold uppercase font-mono px-2 py-0.5 rounded ${rowTagColorAccent}">
                                    ${book.shelf_location}
                                </span>
                                <span class="w-1.5 h-1.5 rounded-full ${available ? 'bg-emerald-400 shadow-[0_0_8px_#34d399]' : 'bg-slate-600'}"></span>
                            </div>
                            <h3 class="font-bold text-white text-xs tracking-tight mt-3 mb-1 group-hover:text-sky-400 transition-colors duration-200 heading-font leading-tight">${book.title}</h3>
                            <p class="text-[11px] text-slate-500">By ${book.author}</p>
                        </div>
                        
                        <div class="flex items-center justify-between pt-3 border-t border-white/5 mt-4 text-[10px] font-mono">
                            <span class="text-slate-600">Asset Register</span>
                            <span class="${available ? 'text-emerald-400' : 'text-slate-500'} font-bold">
                                ${available ? 'IN STOCK' : 'CHECKED OUT'}
                            </span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        // =========================================================================
        // 🧠 FILTER CONTROLS & SEAT RADAR MATROLLER
        // =========================================================================
        function filterRadarZone(zone) {
            globalCurrentZoneFilter = zone;
            ['all', 'main', 'quiet'].forEach(b => {
                const btn = document.getElementById(`zone-btn-${b}`);
                if (b === zone) {
                    btn.className = "px-3.5 py-1.5 rounded-lg text-[10px] font-700 transition-all duration-200 whitespace-nowrap bg-sky-500/10 text-sky-400 border border-sky-400/20";
                } else {
                    btn.className = "px-3.5 py-1.5 rounded-lg text-[10px] font-700 transition-all duration-200 whitespace-nowrap text-slate-400 hover:text-slate-200 border border-transparent";
                }
            });
            renderModularZoneGrid(systemSeatsArray);
        }

        function executeMagicSeatMatch() {
            const match = systemSeatsArray.find(s => !s.is_occupied);
            if (!match) return;

            if(window.innerWidth < 1024) switchMobileTab('seats');

            const targetZone = Math.floor((match.seat_number - 1) / 10) >= 3 ? 'quiet' : 'main';
            if (globalCurrentZoneFilter !== 'all' && globalCurrentZoneFilter !== targetZone) {
                filterRadarZone('all');
            }

            setTimeout(() => {
                const anchor = document.getElementById(`chair-node-anchor-${match.seat_number}`);
                if (anchor) {
                    anchor.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    const targetBox = anchor.firstElementChild;
                    targetBox.classList.add('magic-ripple-active');
                    setTimeout(() => { targetBox.classList.remove('magic-ripple-active'); }, 5000);
                }
            }, 250);
        }

        function executeLiveSearch() {
            const query = document.getElementById('catalog-search').value.trim();
            fetchLiveBooksCatalog(query);
        }

        function switchMobileTab(tab) {
            const seatsPanel = document.getElementById('seats-panel');
            const booksPanel = document.getElementById('books-panel');
            const seatsBtn = document.getElementById('toggle-seats-btn');
            const booksBtn = document.getElementById('toggle-books-btn');

            if (tab === 'seats') {
                seatsPanel.classList.remove('hidden'); seatsPanel.classList.add('block');
                booksPanel.classList.remove('block'); booksPanel.classList.add('hidden');
                seatsBtn.className = "px-4 py-2 rounded-lg text-xs font-700 transition-all duration-200 flex items-center gap-2 bg-slate-800 text-white border border-white/5";
                booksBtn.className = "px-4 py-2 rounded-lg text-xs font-700 transition-all duration-200 flex items-center gap-2 text-slate-400 hover:text-slate-200 border border-transparent";
            } else {
                seatsPanel.classList.remove('block'); seatsPanel.classList.add('hidden');
                booksPanel.classList.remove('hidden'); booksPanel.classList.add('block');
                booksBtn.className = "px-4 py-2 rounded-lg text-xs font-700 transition-all duration-200 flex items-center gap-2 bg-slate-800 text-white border border-white/5";
                seatsBtn.className = "px-4 py-2 rounded-lg text-xs font-700 transition-all duration-200 flex items-center gap-2 text-slate-400 hover:text-slate-200 border border-transparent";
            }
        }

        socket.on('seatUpdated', () => { fetchSystemRadarData(); });
        socket.on('bookUpdated', () => { executeLiveSearch(); });
    </script>
</body>
</html>
