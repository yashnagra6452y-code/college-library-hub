<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Control Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-md shadow-indigo-200">
                    <i class="fa-solid fa-layer-group text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">College Library Hub</h1>
                    <p class="text-xs text-slate-400 font-medium tracking-wide uppercase">Student Live Dashboard</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="connection-badge" class="bg-emerald-50 text-emerald-700 text-xs px-3 py-1.5 font-semibold rounded-full border border-emerald-200 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Systems Active
                </span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 pt-6">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Occupancy Density</p>
                    <h3 id="stat-density" class="text-2xl font-black text-slate-800 mt-1">0%</h3>
                </div>
                <div class="bg-indigo-50 p-3 rounded-lg text-indigo-600"><i class="fa-solid fa-chart-pie text-xl"></i></div>
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Available Study Hubs</p>
                    <h3 id="stat-seats" class="text-2xl font-black text-slate-800 mt-1">0 / 0</h3>
                </div>
                <div class="bg-emerald-50 p-3 rounded-lg text-emerald-600"><i class="fa-solid fa-chair text-xl"></i></div>
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Books On Shelves</p>
                    <h3 id="stat-books" class="text-2xl font-black text-slate-800 mt-1">0 Available</h3>
                </div>
                <div class="bg-amber-50 p-3 rounded-lg text-amber-600"><i class="fa-solid fa-book text-xl"></i></div>
            </div>

        </div>
    </div>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-chair text-indigo-500"></i> Zone Map
                        </h2>
                        <p class="text-xs text-slate-400">Real-time occupancy matrix</p>
                    </div>
                </div>
                
                <div class="bg-slate-50 border border-slate-100 p-6 rounded-xl">
                    <div id="seats-container" class="grid grid-cols-3 gap-4 justify-items-center">
                        </div>
                </div>
                
                <div class="flex gap-4 mt-6 pt-4 border-t border-slate-100 text-xs font-semibold text-slate-500 justify-center">
                    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> Available</span>
                    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-rose-500"></span> Occupied</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <div class="md:flex md:justify-between md:items-center gap-4 mb-6">
                    <div class="mb-4 md:mb-0">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-book-bookmark text-indigo-500"></i> Knowledge Catalog
                        </h2>
                        <p class="text-xs text-slate-400">Search and check item distribution tracks</p>
                    </div>
                    
                    <div class="relative flex-1 max-w-md">
                        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input id="search-input" type="text" oninput="searchBooks()" placeholder="Search titles, authors, locations..." 
                               class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
                    </div>
                </div>

                <div id="books-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[550px] overflow-y-auto pr-1">
                    </div>
            </div>
        </div>

    </main>

    <script>
        const BACKEND_URL = 'https://college-library-hub.onrender.com/api';
        const socket = io('https://college-library-hub.onrender.com');

        // 1. Fetch and show seats inside the Map representation + calculate seat metrics
        async function loadSeats() {
            try {
                const response = await fetch(`${BACKEND_URL}/seats`);
                const seats = await response.json();
                const container = document.getElementById('seats-container');
                container.innerHTML = '';

                let occupiedCount = 0;
                const totalSeats = seats.length;

                seats.forEach(seat => {
                    const isOccupied = seat.is_occupied;
                    if (isOccupied) occupiedCount++;

                    const div = document.createElement('div');
                    div.className = `w-16 h-16 rounded-2xl flex flex-col items-center justify-center border transition-all duration-300 shadow-sm ${
                        isOccupied 
                        ? 'bg-rose-50 border-rose-200 text-rose-700 shadow-rose-50' 
                        : 'bg-emerald-50 border-emerald-200 text-emerald-700 shadow-emerald-50'
                    }`;
                    
                    div.innerHTML = `
                        <span class="text-xs font-black tracking-tighter">S-${seat.seat_number}</span>
                        <i class="fa-solid ${isOccupied ? 'fa-user-lock text-rose-400' : 'fa-circle-check text-emerald-400'} text-xs mt-1"></i>
                    `;
                    container.appendChild(div);
                });

                // Compute real-time analytics updates
                const freeSeats = totalSeats - occupiedCount;
                const densityPercentage = totalSeats > 0 ? Math.round((occupiedCount / totalSeats) * 100) : 0;

                document.getElementById('stat-seats').innerText = `${freeSeats} / ${totalSeats}`;
                document.getElementById('stat-density').innerText = `${densityPercentage}% Full`;

            } catch (error) {
                console.error("Error fetching seats:", error);
            }
        }

        // 2. Fetch and show books inside card grid + calculate inventory metrics
        async function searchBooks() {
            try {
                const query = document.getElementById('search-input').value;
                const url = query ? `${BACKEND_URL}/books?search=${encodeURIComponent(query)}` : `${BACKEND_URL}/books`;
                
                const response = await fetch(url);
                const books = await response.json();
                const container = document.getElementById('books-container');
                container.innerHTML = '';

                let availableBooksCount = 0;

                books.forEach(book => {
                    if (book.is_available) availableBooksCount++;
                    
                    // We only render items to the list grid layout matching query parameters
                    const isAvail = book.is_available;
                    const div = document.createElement('div');
                    div.className = "p-4 bg-slate-50 border border-slate-100 rounded-xl flex flex-col justify-between hover:border-indigo-200 hover:bg-white transition-all duration-200 group";
                    div.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start gap-2 mb-2">
                                <h3 class="font-bold text-slate-800 text-sm leading-tight group-hover:text-indigo-600 transition-colors">${book.title}</h3>
                                <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-md shadow-2xs ${
                                    isAvail ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-rose-50 text-rose-700 border border-rose-200'
                                }">
                                    ${isAvail ? 'Available' : 'Issued'}
                                </span>
                            </div>
                            <p class="text-xs text-slate-500 font-medium mb-3">By ${book.author}</p>
                        </div>
                        <div class="flex gap-1.5 pt-2 border-t border-slate-200/60 text-[10px] font-bold text-slate-400">
                            <span class="bg-white px-2.5 py-1 rounded border border-slate-200 flex items-center gap-1">
                                <i class="fa-solid fa-location-dot text-indigo-500"></i> ${book.shelf_location || 'Not Assigned'}
                            </span>
                        </div>
                    `;
                    container.appendChild(div);
                });

                // Only update global stock indicator metric if the search field is clear
                if (!query) {
                    document.getElementById('stat-books').innerText = `${availableBooksCount} Available`;
                }

                if (books.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full py-12 text-center border-2 border-dashed border-slate-100 rounded-xl">
                            <i class="fa-solid fa-box-open text-slate-300 text-3xl mb-3"></i>
                            <p class="text-slate-400 text-sm font-medium">No catalog listings found.</p>
                        </div>`;
                }
            } catch (error) {
                console.error("Error fetching books:", error);
            }
        }

        // Live Event Listeners via socket communication channels
        socket.on('seatUpdated', () => {
            loadSeats();
        });
        socket.on('bookUpdated', () => {
            searchBooks();
        });

        // Initialize display executions
        loadSeats();
        searchBooks();
    </script>
</body>
</html>
