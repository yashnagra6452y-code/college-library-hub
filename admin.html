<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-amber-400">🔑 Librarian Control Center</h1>

        <div id="auth-card" class="bg-slate-800 p-6 rounded-lg shadow-lg border border-slate-700 mb-8">
            <h2 class="text-lg font-semibold mb-3 text-slate-300">Enter Security PIN to Enable Controls:</h2>
            <div class="flex gap-2">
                <input id="pin-input" type="password" placeholder="Enter Admin PIN..." class="bg-slate-950 border border-slate-700 p-2 rounded w-full text-white focus:outline-amber-500 text-center tracking-widest font-bold">
                <button onclick="savePin()" class="bg-amber-500 text-slate-950 font-bold px-6 py-2 rounded hover:bg-amber-400">Unlock</button>
            </div>
            <p id="auth-status" class="text-sm mt-2 text-slate-400"></p>
        </div>

        <div id="controls-section" class="bg-slate-800 p-6 rounded-lg shadow-lg border border-slate-700 hidden">
            <h2 class="text-xl font-semibold mb-6 text-slate-200">Click a Seat to Toggle Occupancy Status:</h2>
            <div id="admin-seats-container" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:5000/api';
        let currentAdminPin = '';

        function savePin() {
            currentAdminPin = document.getElementById('pin-input').value;
            document.getElementById('auth-status').innerText = "PIN loaded. Attempting action...";
            document.getElementById('controls-section').classList.remove('hidden');
            loadAdminSeats();
        }

        async function loadAdminSeats() {
            try {
                const response = await fetch(`${BACKEND_URL}/seats`);
                const seats = await response.json();
                const container = document.getElementById('admin-seats-container');
                container.innerHTML = ''; 

                seats.forEach(seat => {
                    const button = document.createElement('button');
                    button.className = `p-6 rounded font-bold text-center shadow transition-all duration-200 border-2 ${
                        seat.is_occupied 
                        ? 'bg-red-950 text-red-400 border-red-500 hover:bg-red-900' 
                        : 'bg-green-950 text-green-400 border-green-500 hover:bg-green-900'
                    }`;
                    
                    button.innerHTML = `
                        <span class="block text-sm uppercase text-slate-400">Seat ${seat.seat_number}</span>
                        <span class="text-xl">${seat.is_occupied ? '🔴 BUSY' : '🟢 FREE'}</span>
                    `;

                    // When clicked, send a secure network request to invert the status
                    button.onclick = () => toggleSeatStatus(seat.seat_number, !seat.is_occupied);
                    container.appendChild(button);
                });
            } catch (error) {
                console.error("Error loading panel:", error);
            }
        }

        async function toggleSeatStatus(seatNumber, newStatus) {
            try {
                const response = await fetch(`${BACKEND_URL}/seats/toggle`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-pin': currentAdminPin // 🔒 Send the input PIN inside the secure header
                    },
                    body: JSON.stringify({ seat_number: seatNumber, is_occupied: newStatus })
                });

                const data = await response.json();

                if (response.status === 401) {
                    alert("🚨 Access Denied: Wrong security PIN entered!");
                    return;
                }

                if (data.success) {
                    // Refresh the local admin interface buttons instantly
                    loadAdminSeats();
                }
            } catch (error) {
                alert("Network error talking to server.");
            }
        }
    </script>
</body>
</html>
