<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Library Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Socket.io Client CDN -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-indigo-700 mb-8 text-center flex items-center justify-center gap-2">
            📚 College Library Hub
        </h1>

        <!-- Seat Availability Card -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">🪑 Live Seat Availability</h2>
            <div id="seats-container" class="flex flex-wrap gap-4">
                <!-- Seats will be loaded dynamically here -->
            </div>
        </div>

        <!-- Book Search Card -->
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4">🔍 Search Catalog</h2>
            <div class="flex gap-2 mb-4">
                <input id="search-input" type="text" placeholder="Type book title or author..." class="border p-2 rounded w-full focus:outline-indigo-500">
                <button onclick="searchBooks()" class="bg-indigo-600 text-white px-6 py-2 rounded font-semibold hover:bg-indigo-700 transition">Search</button>
            </div>
            <div id="books-container" class="space-y-2">
                <!-- Books will be loaded dynamically here -->
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://college-library-hub.onrender.com/api';
        const socket = io('https://college-library-hub.onrender.com');

        // 1. Fetch and show seats from database
        async function loadSeats() {
            try {
                const response = await fetch(`${BACKEND_URL}/seats`);
                const seats = await response.json();
                const container = document.getElementById('seats-container');
                container.innerHTML = '';

                seats.forEach(seat => {
                    const div = document.createElement('div');
                    div.className = `p-4 rounded text-white font-bold w-24 text-center shadow-sm ${seat.is_occupied ? 'bg-red-600' : 'bg-green-600'}`;
                    div.innerText = `Seat ${seat.seat_number}\n${seat.is_occupied ? 'Busy' : 'Free'}`;
                    container.appendChild(div);
                });
            } catch (error) {
                alert("Mobile Seat Error: " + error.message);
                console.error("Error fetching seats:", error);
            }
        }

        // 2. Fetch and show books / search catalog
        async function searchBooks() {
            try {
                const query = document.getElementById('search-input').value;
                const url = query ? `${BACKEND_URL}/books?search=${encodeURIComponent(query)}` : `${BACKEND_URL}/books`;
                
                const response = await fetch(url);
                const books = await response.json();
                const container = document.getElementById('books-container');
                container.innerHTML = '';

                if (books.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 italic">No books found matching that search.</p>';
                    return;
                }

                books.forEach(book => {
                    const div = document.createElement('div');
                    div.className = "p-4 border-b flex justify-between items-center hover:bg-gray-50 transition";
                    div.innerHTML = `
                        <div>
                            <h3 class="font-bold text-gray-800">${book.title}</h3>
                            <p class="text-sm text-gray-500">By ${book.author} | 📍 Row ${book.row_letter}, Shelf ${book.shelf_number}</p>
                        </div>
                        <span class="px-3 py-1 rounded text-sm text-white font-semibold ${book.is_available ? 'bg-green-600' : 'bg-red-600'}">
                            ${book.is_available ? 'Available' : 'Issued'}
                        </span>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                alert("Mobile Book Error: " + error.message);
                console.error("Error fetching books:", error);
            }
        }

        // 🚀 Listen for 'seatUpdated' live real-time broadcasts from Render server
        socket.on('seatUpdated', (data) => {
            console.log("Live real-time change received from server!", data);
            loadSeats();
        });

        // Run automatically when the webpage first opens to pull initial data
        loadSeats();
        searchBooks();
    </script>
</body>
</html>
